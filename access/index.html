<style>

:root{
  --gold:#c9a84c;--gold-l:#e8d08a;--gold-d:#8b6914;
  --deep:#09060a;--s1:#120e14;--s2:#1c1620;--s3:#28202e;
  --text:#f0e8f0;--muted:#8a7a90;--faint:#5a4f62;
  --accent:#c04870;--ok:#4ab870;--warn:#e8a030;
  --border:rgba(201,168,76,.18);--border2:rgba(201,168,76,.38);
}
body.th-rose{--gold:#e09aae;--accent:#d05878;--border:rgba(224,154,174,.18);}
body.th-neo{--gold:#5fd4ff;--accent:#ff60a0;--border:rgba(95,212,255,.18);}
body.th-gold{--gold:#e8c060;--deep:#06040a;--s1:#0e0c00;--s2:#180f00;}
body.th-white{--deep:#f8f4f0;--s1:#f0ebe6;--s2:#e8e2dc;--s3:#ddd6ce;--text:#1a1016;--muted:#6a5a60;}
body.th-sakura{--gold:#ffb7c5;--accent:#ff6e8a;--border:rgba(255,183,197,.2);}

*{margin:0;padding:0;box-sizing:border-box;}
html{scroll-behavior:smooth;}
body{font-family:'Noto Sans JP',sans-serif;background:var(--deep);color:var(--text);font-size:14px;line-height:1.7;}

/* ===== MAIN NAV ===== */
#pnav{
  position:sticky;top:0;z-index:500;
  background:rgba(9,6,10,.97);border-bottom:1px solid var(--border);
  backdrop-filter:blur(20px);
}
.pnav-top{
  display:flex;align-items:center;height:52px;
  padding:0 16px;gap:0;
}
.pnav-logo{
  font-family:'Cormorant Garamond',serif;font-style:italic;font-weight:300;
  color:var(--gold);text-decoration:none;font-size:20px;
  padding-right:16px;border-right:1px solid var(--border);margin-right:4px;
  white-space:nowrap;
}
.pnav-links{
  display:flex;flex:1;overflow:hidden;
}
.pnav-link{
  display:flex;align-items:center;gap:5px;
  height:52px;padding:0 12px;
  font-size:11px;color:var(--muted);text-decoration:none;
  border-right:1px solid var(--border);transition:all .2s;
  white-space:nowrap;letter-spacing:.04em;
}
.pnav-link:hover{color:var(--gold);background:rgba(201,168,76,.04);}
.pnav-link.active{color:var(--gold);border-bottom:2px solid var(--gold);}
.pnl-icon{font-size:13px;}
.pnav-rsv{
  flex-shrink:0;display:flex;align-items:center;
  height:52px;padding:0 18px;
  background:var(--gold);color:var(--deep);
  font-size:12px;font-weight:500;text-decoration:none;
  transition:background .2s;white-space:nowrap;
}
.pnav-rsv:hover{background:var(--gold-l);}

/* ハンバーガーボタン */
#pnav-burger{
  display:none;flex-direction:column;justify-content:center;align-items:center;
  width:48px;height:52px;gap:5px;cursor:pointer;
  background:transparent;border:none;flex-shrink:0;
}
#pnav-burger span{
  display:block;width:22px;height:1.5px;
  background:var(--muted);border-radius:2px;transition:all .3s;
}
#pnav-burger.open span:nth-child(1){transform:translateY(6.5px) rotate(45deg);background:var(--gold);}
#pnav-burger.open span:nth-child(2){opacity:0;}
#pnav-burger.open span:nth-child(3){transform:translateY(-6.5px) rotate(-45deg);background:var(--gold);}

/* ドロワー */
#pnav-drawer{
  display:none;position:fixed;top:52px;left:0;right:0;
  background:rgba(9,6,10,.99);border-bottom:1px solid var(--border);
  z-index:499;flex-direction:column;
  max-height:calc(100vh - 52px);overflow-y:auto;
}
#pnav-drawer.open{display:flex;}
.drawer-item{
  display:flex;align-items:center;gap:12px;
  padding:16px 20px;font-size:14px;color:var(--text);
  text-decoration:none;border-bottom:1px solid rgba(201,168,76,.06);
  transition:all .2s;min-height:52px;
}
.drawer-item:hover,.drawer-item:active{color:var(--gold);background:rgba(201,168,76,.05);}
.di-icon{font-size:16px;width:22px;text-align:center;flex-shrink:0;}
.di-label{flex:1;}
.di-arr{color:var(--faint);font-size:14px;}
.drawer-rsv{
  margin:14px 16px;padding:16px;text-align:center;
  background:var(--gold);color:var(--deep);
  font-size:14px;font-weight:500;letter-spacing:.08em;
  text-decoration:none;border-radius:4px;
  display:flex;align-items:center;justify-content:center;min-height:52px;
}

/* ===== STORE INFO BAR ===== */
#store-info-bar{
  background:rgba(18,14,20,.98);border-bottom:1px solid var(--border);
  padding:0;display:flex;flex-wrap:wrap;
  position:sticky;top:52px;z-index:497;
  backdrop-filter:blur(16px);
}
.sib-item{
  display:flex;align-items:center;gap:8px;
  padding:10px 20px;border-right:1px solid var(--border);
  text-decoration:none;transition:background .2s;
}
.sib-item:hover{background:rgba(201,168,76,.04);}
.sib-label{
  font-family:'Space Mono',monospace;font-size:9px;
  letter-spacing:.2em;color:var(--gold);
  background:rgba(201,168,76,.1);padding:2px 7px;
  border:1px solid var(--border);white-space:nowrap;
}
.sib-val{font-size:12px;color:var(--muted);white-space:nowrap;}
.sib-tel{font-family:'Space Mono',monospace;font-size:13px;color:var(--gold);}

/* ===== SECTIONS ===== */
.sec{padding:48px clamp(16px,4vw,48px);}
.sec-alt{background:var(--s1);}
.sch{display:flex;align-items:baseline;gap:14px;margin-bottom:28px;padding-bottom:13px;border-bottom:1px solid var(--border);}
.sch-ja{font-size:20px;font-weight:400;color:var(--text);letter-spacing:.06em;}
.sch-en{font-family:'Space Mono',monospace;font-size:10px;letter-spacing:.3em;color:var(--gold);}

/* ===== CAST CARDS ===== */
.cast-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(160px,1fr));gap:14px;}
.gc{cursor:pointer;transition:all .2s;}
.gc:hover .gphoto{border-color:var(--gold);}
.gphoto{aspect-ratio:2/3;background:var(--s2);border:1px solid var(--border);overflow:hidden;position:relative;transition:border-color .25s;border-radius:3px;}
.gphoto img{width:100%;height:100%;object-fit:cover;display:block;}
.gph{width:100%;height:100%;display:flex;align-items:center;justify-content:center;background:linear-gradient(160deg,var(--s2),var(--s3));}
.gph span{font-family:'Space Mono',monospace;font-size:10px;color:var(--faint);}
.gbadge{position:absolute;top:7px;left:7px;font-family:'Space Mono',monospace;font-size:9px;padding:2px 6px;}
.bn{background:var(--accent);color:#fff;}.br{background:rgba(201,168,76,.88);color:var(--deep);}
.gmeta{padding:7px 3px;}
.gname{font-size:13px;color:var(--text);letter-spacing:.06em;margin-bottom:2px;}
.gage{font-family:'Space Mono',monospace;font-size:10px;color:var(--muted);}
.gtags{display:flex;flex-wrap:wrap;gap:3px;margin-top:4px;}
.gtag{font-size:10px;color:var(--muted);border:1px solid var(--border);padding:1px 5px;border-radius:2px;}
.gmsg{font-size:11px;color:var(--muted);font-style:italic;margin-top:4px;border-left:2px solid var(--border2);padding-left:6px;line-height:1.5;}
.gst{font-family:'Space Mono',monospace;font-size:10px;margin-top:5px;}
.s-in{color:var(--ok);}.s-soon{color:var(--warn);}.s-out{color:var(--faint);}

/* ===== SCHEDULE ===== */
.stbl-wrap{overflow-x:auto;}
.stbl{width:100%;border-collapse:collapse;min-width:480px;}
.stbl th{font-family:'Space Mono',monospace;font-size:10px;letter-spacing:.14em;color:var(--gold);padding:9px 13px;text-align:left;border-bottom:1px solid var(--border);background:var(--s2);}
.stbl td{padding:12px 13px;border-bottom:1px solid rgba(201,168,76,.05);}
.sbadge{display:inline-block;font-family:'Space Mono',monospace;font-size:10px;padding:2px 8px;border-radius:2px;}
.sb-in{background:rgba(74,184,112,.12);color:var(--ok);border:1px solid rgba(74,184,112,.3);}
.sb-soon{background:rgba(232,160,48,.1);color:var(--warn);border:1px solid rgba(232,160,48,.25);}
.sb-off{background:var(--s2);color:var(--faint);border:1px solid var(--border);}

/* ===== PRICE ===== */
.price-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(240px,1fr));gap:18px;margin-bottom:24px;}
.pcard{background:var(--s1);border:1px solid var(--border);padding:24px;}
.pplan{font-family:'Space Mono',monospace;font-size:10px;letter-spacing:.28em;color:var(--gold);margin-bottom:6px;}
.pname{font-size:16px;color:var(--text);margin-bottom:12px;}
.pmain{font-family:'Space Mono',monospace;font-size:22px;color:var(--gold);margin-bottom:3px;}
.pmain small{font-size:12px;color:var(--muted);}
.pnote2{font-size:11px;color:var(--muted);margin-bottom:16px;line-height:1.8;}
.plist{list-style:none;display:flex;flex-direction:column;gap:6px;}
.plist li{font-size:12px;color:var(--muted);padding-left:14px;position:relative;}
.plist li::before{content:'—';position:absolute;left:0;color:var(--gold-d);}
.ptbl{width:100%;border-collapse:collapse;}
.ptbl th,.ptbl td{padding:9px 13px;text-align:left;border:1px solid rgba(201,168,76,.09);font-size:12px;}
.ptbl th{font-family:'Space Mono',monospace;font-size:10px;color:var(--gold);background:var(--s2);}
.ptbl td{color:var(--muted);}

/* ===== AREA ===== */
.area-grid-new{display:grid;grid-template-columns:repeat(auto-fill,minmax(160px,1fr));gap:8px;}
.area-card{background:var(--s2);border:1px solid var(--border);border-radius:5px;padding:12px 14px;transition:all .2s;}
.area-card:hover{border-color:var(--gold);}
.area-card-name{font-size:13px;color:var(--text);margin-bottom:4px;}
.area-card-fee{font-family:'Space Mono',monospace;font-size:11px;}
.fee-free{color:var(--ok);}.fee-paid{color:var(--gold);}
.area-card-note{font-size:10px;color:var(--muted);margin-top:3px;}

/* ===== ACCESS ===== */
.acc-grid{display:grid;grid-template-columns:1fr 1fr;gap:36px;align-items:start;}
.acc-map{background:var(--s2);border:1px solid var(--border);aspect-ratio:16/9;display:flex;align-items:center;justify-content:center;position:relative;overflow:hidden;}
.maplines{position:absolute;inset:0;background-image:repeating-linear-gradient(0deg,transparent,transparent 39px,rgba(201,168,76,.04) 39px,rgba(201,168,76,.04) 40px),repeating-linear-gradient(90deg,transparent,transparent 39px,rgba(201,168,76,.04) 39px,rgba(201,168,76,.04) 40px);}
.mappin{position:relative;z-index:1;text-align:center;}
.mapd{width:11px;height:11px;border-radius:50%;background:var(--gold);margin:0 auto 5px;animation:pulse 2s infinite;}
@keyframes pulse{0%,100%{box-shadow:0 0 8px rgba(201,168,76,.4)}50%{box-shadow:0 0 22px rgba(201,168,76,.7)}}
.mapl{font-family:'Space Mono',monospace;font-size:10px;color:var(--gold);letter-spacing:.15em;}
.acc-dl dt{font-family:'Space Mono',monospace;font-size:10px;letter-spacing:.2em;color:var(--gold);margin-top:18px;margin-bottom:5px;}
.acc-dl dd{font-size:13px;color:var(--muted);line-height:1.9;}

/* ===== RECRUIT ===== */
.rec-banner{background:linear-gradient(135deg,var(--s2),var(--s3));border:1px solid var(--border);padding:38px;display:flex;align-items:center;justify-content:space-between;gap:22px;flex-wrap:wrap;}
.rec-text h3{font-size:19px;font-weight:400;color:var(--text);margin-bottom:7px;}
.rec-text p{font-size:13px;color:var(--muted);line-height:1.9;max-width:480px;}
.rec-btn{background:var(--accent);color:#fff;padding:13px 34px;font-size:13px;text-decoration:none;transition:opacity .2s;}
.rec-btn:hover{opacity:.85;}
.info-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(180px,1fr));gap:12px;}
.info-box{background:var(--s2);border:1px solid var(--border);border-radius:5px;padding:14px 16px;}
.info-label{font-family:'Space Mono',monospace;font-size:9px;letter-spacing:.18em;color:var(--gold);margin-bottom:5px;}
.info-val{font-size:13px;color:var(--text);}

/* ===== PORTAL BTN ===== */
.portal-btn{
  display:inline-flex;align-items:center;gap:8px;
  margin-top:24px;padding:14px 28px;
  background:var(--accent);color:#fff;
  font-size:13px;text-decoration:none;letter-spacing:.06em;
  transition:opacity .2s;
}
.portal-btn:hover{opacity:.85;}

/* ===== FOOTER ===== */
.page-footer{background:var(--s1);border-top:1px solid var(--border);padding:24px clamp(16px,4vw,48px);}
.pf-inner{display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:12px;}
.pf-links{display:flex;gap:16px;flex-wrap:wrap;}
.pf-links a{font-size:11px;color:var(--faint);text-decoration:none;transition:color .2s;}
.pf-links a:hover{color:var(--gold);}
.pf-copy{font-family:'Space Mono',monospace;font-size:10px;color:var(--faint);}

/* ===== MOBILE ===== */
@media(max-width:768px){
  .pnav-links{display:none !important;}
  .pnav-rsv{display:none !important;}
  #pnav-burger{display:flex;}
  .pnav-logo{border-right:none;}
  .pnav-top{justify-content:space-between;}

  /* 店舗情報バー：縦2列 */
  #store-info-bar{display:grid;grid-template-columns:1fr 1fr;}
  .sib-item{padding:8px 12px;border-right:none;border-bottom:1px solid var(--border);}
  .sib-item:nth-child(odd){border-right:1px solid var(--border);}

  .sec{padding:32px 16px;}
  .cast-grid{grid-template-columns:repeat(2,1fr);gap:10px;}
  .acc-grid{grid-template-columns:1fr;gap:20px;}
  .price-grid{grid-template-columns:1fr;}
  .ptbl th:last-child,.ptbl td:last-child{display:none;}
  .area-grid-new{grid-template-columns:repeat(2,1fr);}
  .rec-banner{padding:22px 16px;flex-direction:column;text-align:center;}
  .rec-btn{width:100%;text-align:center;}
  .stbl{min-width:0;}
  .stbl td:nth-child(2){display:none;}
  .pf-inner{flex-direction:column;align-items:flex-start;gap:8px;}
}
@media(max-width:400px){
  .cast-grid{gap:8px;}
  #store-info-bar{grid-template-columns:1fr;}
  .sib-item:nth-child(odd){border-right:none;}
}

</style>
</head>

// LocalStorage から最新データを上書き（管理画面と同じブラウザで使う場合）
(function() {
  try {
    const raw = localStorage.getItem('luxe_site_data');
    if (raw) {
      const data = JSON.parse(raw);
      // すべてのキーを上書き（deep replace）
      Object.keys(data).forEach(k => { S[k] = data[k]; });

function gCard(c) {
  const badge = c.rank ? `<span class="gbadge ${c.rank==='NEW'?'bn':'br'}">${c.rank}</span>` : '';
  const photo = c.photo ? `<img src="${c.photo}" onerror="this.style.display='none'">` : `<div class="gph"><span>PHOTO</span></div>`;
  const st = c.status==='in'?'s-in':c.status==='soon'?'s-soon':'s-out';
  const stxt = c.status==='in'?'● 出勤中':c.status==='soon'?'◉ 出勤予定':'○ 本日休み';
  const msg = c.message ? `<div class="gmsg">${c.message}</div>` : '';
  return `<div class="gc">
    <div class="gphoto">${photo}${badge}</div>
    <div class="gmeta">
      <div class="gname">${c.name} <span style="font-size:11px;color:var(--muted);">/ ${c.roma}</span></div>
      <div class="gage">${c.age}歳 · ${c.height}${c.blood?' · '+c.blood+'型':''}</div>
      <div class="gtags">${(c.tags||[]).map(t=>`<span class="gtag">${t}</span>`).join('')}</div>
      ${msg}
      <div class="gst ${st}">${stxt}</div>
    </div>
  </div>`;
}

function renderNewCast() {
  const el = document.getElementById('page-content');
  const list = (S.cast||[]).filter(c=>c.rank==='NEW'||c.status!=='out');
  el.innerHTML = `<div class="cast-grid">${(list.length?list:S.cast||[]).slice(0,12).map(c=>gCard(c)).join('')}</div>`;
}

function renderRanking() {
  const el = document.getElementById('page-content');
  const ranked = (S.cast||[]).filter(c=>c.rank&&c.rank!=='NEW').sort((a,b)=>a.rank.localeCompare(b.rank));
  const others = (S.cast||[]).filter(c=>!c.rank||c.rank==='NEW');
  const all = [...ranked,...others];
  el.innerHTML = `<div class="cast-grid">${all.map((c,i)=>{
    let card = gCard(c);
    if(i<3){
      const medals=['🥇','🥈','🥉'];
      card = card.replace('<div class="gphoto">',`<div class="gphoto"><span style="position:absolute;top:7px;right:7px;font-size:18px;z-index:2;">${medals[i]}</span>`);
    }
    return card;
  }).join('')}</div>`;
}

function init() {
  // テーマ適用
  if (S.theme && S.theme !== 'noir') document.body.className = 'th-' + S.theme;

  // ロゴ・ナビ
  const logo = document.getElementById('nav-logo');
  if (logo) logo.textContent = S.sitename || 'Luxe Night';
  const rsv = document.getElementById('nav-rsv');
  if (rsv) rsv.textContent = S.ctabtn || '今すぐ予約';
  const drsv = document.getElementById('drawer-rsv');
  if (drsv) drsv.textContent = '📞 ' + (S.ctabtn || '今すぐ予約する');

  // 店舗情報バー
  const tel = S.tel || '—';
  const telEl = document.getElementById('d-tel');
  if (telEl) telEl.textContent = tel;
  const telLink = document.getElementById('sib-tel');
  if (telLink) telLink.href = 'tel:' + tel.replace(/[^0-9]/g,'');
  const lineEl = document.getElementById('d-line');
  if (lineEl) lineEl.textContent = S.line || '—';
  const openEl = document.getElementById('d-open');
  if (openEl) openEl.textContent = (S.open||'—') + ' 〜 ' + (S.close||'—') + '（年中無休）';
  const castCountEl = document.getElementById('d-cast-count');
  if (castCountEl) {
    const inCount = (S.cast||[]).filter(c=>c.status!=='out').length;
    castCountEl.textContent = `在籍 ${(S.cast||[]).length}名 / 本日 ${inCount}名`;
  }

  // タイトル・コピーライト
  document.title = 'アクセス・連絡先 | ' + (S.sitename || 'Luxe Night');
  const copy = document.getElementById('d-copy');
  if (copy) copy.textContent = S.copy || '© 2025 LUXE NIGHT.';

  // ポータルURLボタン
  const pageId = 'access';
  const pageData = (S.pages||[]).find(p=>p.id===pageId);
  if (pageData?.portalUrl) {
    const wrap = document.getElementById('portal-btn-wrap');
    if (wrap) wrap.innerHTML = `<a href="${pageData.portalUrl}" target="_blank" class="portal-btn">🔗 ${pageData.portalLabel||'ポータルサイトで見る'}</a>`;
  }

  // コンテンツ描画
  renderAccess();
}

init();

// ============================================================
//  ドロワーナビ
// ============================================================
function toggleDrawer() {
  const btn = document.getElementById('pnav-burger');
  const drawer = document.getElementById('pnav-drawer');
  const isOpen = drawer.classList.toggle('open');
  btn.classList.toggle('open', isOpen);
  document.body.style.overflow = isOpen ? 'hidden' : '';
}
function closeDrawer() {
  document.getElementById('pnav-burger').classList.remove('open');
  document.getElementById('pnav-drawer').classList.remove('open');
  document.body.style.overflow = '';
}
document.addEventListener('click', e => {
  const drawer = document.getElementById('pnav-drawer');
  if (!drawer.classList.contains('open')) return;
  if (!document.getElementById('pnav').contains(e.target) && !drawer.contains(e.target)) closeDrawer();
});
</script>
